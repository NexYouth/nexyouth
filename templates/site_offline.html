<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>NexYouth</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#1A6640 0%,#2D9A5E 50%,#3FB572 100%);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:2rem;
}
.box{max-width:520px}
.tag{
  display:inline-block;
  background:rgba(255,255,255,.18);
  padding:.35rem 1rem;
  border-radius:100px;
  font-size:.72rem;
  font-weight:600;
  letter-spacing:.14em;
  text-transform:uppercase;
  margin-bottom:1.4rem;
  backdrop-filter:blur(8px);
}
h1{
  font-size:clamp(1.8rem,4vw,2.6rem);
  font-weight:700;
  line-height:1.2;
  margin-bottom:1rem;
  letter-spacing:-.01em;
}
p{
  font-size:1rem;
  line-height:1.6;
  opacity:.92;
  margin-bottom:.8rem;
}
a{color:#fff;text-decoration:underline}
.foot{
  margin-top:2rem;
  font-size:.82rem;
  opacity:.75;
}
</style>
</head>
<body>
<div class="box">
  <span class="tag">🌱 NexYouth</span>
  <h1>This site is currently private.</h1>
  <p>The public site is offline at this time.</p>
  <p>For inquiries, please contact <a href="mailto:nexyouth.master@gmail.com">nexyouth.master@gmail.com</a>.</p>
  <div class="foot">© NexYouth</div>
</div>
</body>
</html>
